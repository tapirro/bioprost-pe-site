<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f5e9"/>
      <stop offset="1" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a5632"/>
      <stop offset="1" stop-color="#0f3b20"/>
    </linearGradient>
  </defs>
  <rect width="320" height="240" fill="url(#bg)" rx="10"/>
  <!-- Leaves -->
  <ellipse cx="60" cy="50" rx="28" ry="10" fill="#4caf50" opacity="0.35" transform="rotate(-30 60 50)"/>
  <ellipse cx="260" cy="60" rx="32" ry="11" fill="#4caf50" opacity="0.35" transform="rotate(25 260 60)"/>
  <ellipse cx="40" cy="200" rx="26" ry="9" fill="#4caf50" opacity="0.35" transform="rotate(-10 40 200)"/>
  <ellipse cx="280" cy="195" rx="30" ry="10" fill="#4caf50" opacity="0.35" transform="rotate(15 280 195)"/>
  <!-- Bottle body -->
  <rect x="120" y="70" width="80" height="130" rx="8" fill="url(#bottle)"/>
  <!-- Bottle neck -->
  <rect x="140" y="55" width="40" height="20" rx="3" fill="#0f3b20"/>
  <!-- Cap -->
  <rect x="135" y="45" width="50" height="18" rx="4" fill="#2d6a3f"/>
  <!-- Label -->
  <rect x="128" y="100" width="64" height="70" fill="#f5f5dc" opacity="0.95"/>
  <text x="160" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a5632">BIOPROST</text>
  <text x="160" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">Salud Prostatica</text>
  <line x1="135" y1="148" x2="185" y2="148" stroke="#1a5632" stroke-width="0.6"/>
  <text x="160" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#666">Achiote · Una de Gato</text>
  <text x="160" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#666">20 capsulas</text>
  <!-- Small sparkle -->
  <circle cx="90" cy="100" r="3" fill="#4caf50" opacity="0.6"/>
  <circle cx="235" cy="140" r="2.5" fill="#4caf50" opacity="0.6"/>
</svg>
